data:
  num_kv_pairs: 48
  num_queries: 48
  vocab_size: 256
model:
  d_ff: 1024
  d_model: 128
  dropout: 0.1
  n_heads: 4
  n_kv_heads: 4
  n_layers: 4
  ssm_state_dim: 16
training:
  batch_size: 64
  device: cuda
  eval_interval: 250
  g_star_filler: 0.05
  gate_learning_rate: 3.0e-05
  lambda_gate: 0.05
  learning_rate: 0.0003
  log_interval: 100
  max_steps: 7000
  seq_len: 256
  warmup_steps: 500
  weight_decay: 0.01
