# Small config for more serious experiments
model:
  d_model: 256
  n_layers: 6
  ssm_state_dim: 16
  n_heads: 8
  n_kv_heads: 2
  d_ff: 1024
  dropout: 0.0

training:
  batch_size: 8
  seq_len: 512
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_steps: 10000
  warmup_steps: 1000
  log_interval: 100
  eval_interval: 500
  
  # Gate loss
  lambda_gate: 1.0
  g_star: 0.15

data:
  vocab_size: 256
  num_kv_pairs: 16
  num_queries: 8
