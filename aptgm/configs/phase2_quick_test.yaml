# Quick test for Phase 2 verification
model:
  d_model: 64
  n_layers: 2
  ssm_state_dim: 8
  n_heads: 4
  n_kv_heads: 2
  d_ff: 256
  dropout: 0.0

training:
  batch_size: 8
  seq_len: 64
  learning_rate: 5.0e-4
  weight_decay: 0.1
  max_steps: 500  # Much shorter for quick test
  warmup_steps: 50
  log_interval: 50
  eval_interval: 500
  
  lambda_gate: 1.0
  g_star: 0.15

data:
  vocab_size: 128
  num_kv_pairs: 6
  num_queries: 3
